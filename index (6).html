<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Boutique VIP</title>

  <!-- =============================================
       PWA — META TAGS PARA INSTALAR EN CELULAR
  ============================================= -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2C1810" />
  <meta name="mobile-web-app-capable" content="yes" />

  <!-- iOS (iPhone/iPad) -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Boutique VIP" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- =============================================
       TIPOGRAFÍAS ELEGANTES DESDE GOOGLE FONTS
  ============================================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       VARIABLES GLOBALES — Paleta de colores
    ============================================= */
    :root {
      --crema:        #FDF6F0;
      --crema-oscura: #F5E8DC;
      --dorado:       #C9A84C;
      --dorado-claro: #E8C96B;
      --dorado-oscuro:#9E7A2A;
      --marron:       #2C1810;
      --marron-suave: #5C3D2E;
      --blanco:       #FFFFFF;
      --sombra-dorada: 0 4px 20px rgba(201,168,76,0.18);
      --sombra-suave:  0 2px 12px rgba(44,24,16,0.08);
      --radio:        16px;
    }

    /* =============================================
       RESET Y BASE
    ============================================= */
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      font-family: 'Lato', sans-serif;
      background: var(--crema);
      color: var(--marron);
      overflow: hidden;
    }

    /* =============================================
       PANTALLA SPLASH — Bienvenida elegante
    ============================================= */
    #splash {
      position: fixed;
      inset: 0;
      background: var(--marron);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: fadeInSplash 0.5s ease forwards;
      overflow: hidden;
    }

    /* Textura de fondo del splash */
    #splash::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 50%);
    }

    /* Líneas decorativas del splash */
    #splash::after {
      content: '';
      position: absolute;
      width: 1px;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--dorado), transparent);
      top: 15%;
      left: 50%;
    }

    .splash-content {
      position: relative;
      text-align: center;
      animation: fadeUpIn 1s ease 0.3s both;
    }

    .splash-ornamento {
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 6px;
      color: var(--dorado);
      opacity: 0.7;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .splash-logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(38px, 10vw, 52px);
      font-weight: 700;
      color: var(--dorado);
      line-height: 1.1;
      letter-spacing: 2px;
      text-shadow: 0 0 40px rgba(201,168,76,0.4);
    }

    .splash-logo span {
      display: block;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 4px;
      color: var(--dorado-claro);
      margin-top: 4px;
    }

    .splash-linea {
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--dorado), transparent);
      margin: 22px auto;
    }

    .splash-subtitulo {
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      letter-spacing: 3px;
      color: rgba(201,168,76,0.75);
      text-transform: uppercase;
      margin-bottom: 50px;
    }

    .btn-splash {
      font-family: 'Cinzel', serif;
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--marron);
      background: linear-gradient(135deg, var(--dorado), var(--dorado-claro));
      border: none;
      padding: 16px 40px;
      border-radius: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(201,168,76,0.35);
    }

    .btn-splash:hover, .btn-splash:active {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201,168,76,0.5);
    }

    /* Ocultar splash con fade */
    #splash.ocultar {
      animation: fadeOutSplash 0.6s ease forwards;
    }

    /* =============================================
       APP PRINCIPAL — Contenedor
    ============================================= */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #app.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* =============================================
       HEADER DE LA APP
    ============================================= */
    .app-header {
      background: var(--blanco);
      border-bottom: 1px solid rgba(201,168,76,0.2);
      padding: 14px 20px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: var(--sombra-suave);
      position: relative;
      z-index: 10;
    }

    .header-logo {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--dorado-oscuro);
      letter-spacing: 1px;
    }

    .header-logo span {
      font-size: 11px;
      font-weight: 300;
      font-style: italic;
      display: block;
      color: var(--marron-suave);
      letter-spacing: 2px;
      margin-top: -2px;
    }

    .header-btn-carrito {
      position: relative;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--dorado-oscuro);
    }

    .carrito-badge {
      position: absolute;
      top: -6px; right: -6px;
      background: var(--dorado);
      color: var(--marron);
      font-size: 9px;
      font-weight: 700;
      width: 16px; height: 16px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }

    /* =============================================
       SECCIONES PRINCIPALES (páginas)
    ============================================= */
    .contenido-principal {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--crema);
      /* Espacio para la nav inferior */
      padding-bottom: 75px;
    }

    /* Cada sección/página de la app */
    .seccion {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .seccion.activa {
      display: block;
    }

    /* =============================================
       SECCIÓN INICIO — Hero y destacados
    ============================================= */
    .hero-banner {
      background: linear-gradient(160deg, var(--marron) 0%, #4a2c1a 100%);
      padding: 30px 22px 28px;
      position: relative;
      overflow: hidden;
    }

    .hero-banner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 80% 50%, rgba(201,168,76,0.15) 0%, transparent 65%);
    }

    .hero-tag {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--dorado);
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 10px;
    }

    .hero-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--blanco);
      line-height: 1.3;
      margin-bottom: 8px;
    }

    .hero-titulo em {
      color: var(--dorado-claro);
      font-style: italic;
    }

    .hero-subtitulo {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.5px;
      margin-bottom: 22px;
    }

    .hero-btn {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--marron);
      background: linear-gradient(135deg, var(--dorado), var(--dorado-claro));
      padding: 12px 28px;
      border-radius: 2px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(201,168,76,0.4);
    }

    /* Ornamento decorativo del hero */
    .hero-ornamento {
      position: absolute;
      right: -20px; top: 50%;
      transform: translateY(-50%);
      font-size: 100px;
      opacity: 0.04;
      color: var(--dorado);
      font-family: 'Playfair Display', serif;
      pointer-events: none;
    }

    /* Cards de categorías en inicio */
    .seccion-titulo {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--marron);
      padding: 22px 20px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .seccion-titulo::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(201,168,76,0.4), transparent);
    }

    /* =============================================
       SCROLL HORIZONTAL DE CATEGORÍAS
    ============================================= */
    .categorias-scroll {
      display: flex;
      gap: 12px;
      padding: 4px 20px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .categorias-scroll::-webkit-scrollbar { display: none; }

    .chip-categoria {
      flex-shrink: 0;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 8px 18px;
      border-radius: 30px;
      border: 1px solid rgba(201,168,76,0.4);
      background: var(--blanco);
      color: var(--marron-suave);
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .chip-categoria.activo, .chip-categoria:hover {
      background: var(--marron);
      color: var(--dorado);
      border-color: var(--marron);
    }

    /* =============================================
       GRID / CARDS DE PRODUCTOS
    ============================================= */
    .productos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 4px 16px 20px;
    }

    .card-producto {
      background: var(--blanco);
      border-radius: var(--radio);
      overflow: hidden;
      box-shadow: var(--sombra-dorada);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      position: relative;
      cursor: pointer;
    }

    .card-producto:active {
      transform: scale(0.97);
    }

    /* Imagen del producto */
    .card-imagen {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: var(--crema-oscura);
    }

    /* Placeholder cuando no hay imagen real */
    .card-imagen-placeholder {
      width: 100%;
      aspect-ratio: 1 / 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, var(--crema-oscura), var(--crema));
      position: relative;
      overflow: hidden;
    }

    .card-imagen-placeholder::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 30%, rgba(201,168,76,0.12), transparent 70%);
    }

    .card-imagen-placeholder .icono-prod {
      font-size: 36px;
      margin-bottom: 6px;
      opacity: 0.6;
    }

    .card-imagen-placeholder .cat-label {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--dorado-oscuro);
      text-transform: uppercase;
      opacity: 0.7;
    }

    /* Badge de producto */
    .badge {
      position: absolute;
      top: 10px; left: 10px;
      font-family: 'Cinzel', serif;
      font-size: 7px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 2px;
      font-weight: 600;
    }

    .badge-exclusivo {
      background: var(--marron);
      color: var(--dorado);
    }

    .badge-popular {
      background: var(--dorado);
      color: var(--marron);
    }

    /* Info de la card */
    .card-info {
      padding: 12px 12px 10px;
    }

    .card-categoria-tag {
      font-family: 'Cinzel', serif;
      font-size: 8px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--dorado-oscuro);
      opacity: 0.75;
      margin-bottom: 4px;
    }

    .card-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 13.5px;
      font-weight: 600;
      color: var(--marron);
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .card-precio {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--dorado-oscuro);
      margin-bottom: 10px;
    }

    .card-precio span {
      font-family: 'Lato', sans-serif;
      font-size: 10px;
      font-weight: 300;
      color: var(--marron-suave);
      margin-left: 4px;
    }

    /* Botón Adquirir */
    .btn-adquirir {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--marron);
      background: linear-gradient(135deg, var(--dorado), var(--dorado-claro));
      border: none;
      padding: 10px 8px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 2px 8px rgba(201,168,76,0.3);
    }

    .btn-adquirir:active {
      transform: scale(0.97);
      box-shadow: 0 1px 4px rgba(201,168,76,0.2);
    }

    /* =============================================
       SECCIÓN CATÁLOGO — Vista completa con filtros
    ============================================= */
    .catalogo-header {
      background: var(--marron);
      padding: 22px 20px 18px;
    }

    .catalogo-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--dorado);
      margin-bottom: 4px;
    }

    .catalogo-header p {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }

    /* =============================================
       MODAL DETALLE DE PRODUCTO
    ============================================= */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(44,24,16,0.75);
      z-index: 500;
      backdrop-filter: blur(4px);
      align-items: flex-end;
    }

    .modal-overlay.activo {
      display: flex;
    }

    .modal-sheet {
      background: var(--blanco);
      width: 100%;
      border-radius: 24px 24px 0 0;
      padding: 24px 22px 40px;
      animation: slideUp 0.35s ease;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-handle {
      width: 40px; height: 4px;
      background: var(--crema-oscura);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-categoria {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dorado-oscuro);
      margin-bottom: 6px;
    }

    .modal-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--marron);
      margin-bottom: 8px;
    }

    .modal-precio {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--dorado-oscuro);
      margin-bottom: 16px;
    }

    .modal-descripcion {
      font-size: 14px;
      line-height: 1.7;
      color: var(--marron-suave);
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--crema-oscura);
    }

    .modal-caracteristicas {
      margin-bottom: 24px;
    }

    .modal-caracteristicas h4 {
      font-family: 'Cinzel', serif;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dorado-oscuro);
      margin-bottom: 10px;
    }

    .caract-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--marron-suave);
    }

    .caract-item::before {
      content: '✦';
      color: var(--dorado);
      font-size: 8px;
    }

    .modal-btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(37,211,102,0.35);
    }

    .modal-cerrar {
      position: absolute;
      top: 16px; right: 16px;
      background: var(--crema-oscura);
      border: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      color: var(--marron);
      display: flex; align-items: center; justify-content: center;
    }

    /* =============================================
       SECCIÓN ASESORÍA (placeholder hasta Fase 3)
    ============================================= */
    .asesoria-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 30px;
      text-align: center;
    }

    .asesoria-placeholder .icono {
      font-size: 60px;
      margin-bottom: 20px;
    }

    .asesoria-placeholder h3 {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--marron);
      margin-bottom: 10px;
    }

    .asesoria-placeholder p {
      font-size: 14px;
      color: var(--marron-suave);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .btn-wa-grande {
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: white;
      padding: 16px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      box-shadow: 0 4px 20px rgba(37,211,102,0.35);
    }

    /* =============================================
       SECCIÓN MI CUENTA
    ============================================= */
    .mi-cuenta-hero {
      background: linear-gradient(160deg, var(--marron), #4a2c1a);
      padding: 40px 24px 30px;
      text-align: center;
      color: var(--blanco);
    }

    .cuenta-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--dorado), var(--dorado-claro));
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 14px;
    }

    .cuenta-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      col
