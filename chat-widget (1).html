<style>
/* ── CHAT WIDGET ── */
#vip-chat-btn {
  position: fixed;
  bottom: 88px;
  right: 24px;
  z-index: 300;
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background: linear-gradient(135deg, #c4a046, #8a6d2e);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  box-shadow: 0 4px 20px rgba(196,160,70,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
  animation: chatPulse 3s infinite;
}
@keyframes chatPulse {
  0%,100% { box-shadow: 0 4px 20px rgba(196,160,70,0.35); }
  50%      { box-shadow: 0 4px 32px rgba(196,160,70,0.6); }
}
#vip-chat-btn:hover { transform: scale(1.08); }
#vip-chat-btn .chat-badge {
  position: absolute;
  top: -4px; right: -4px;
  background: #e8dfc8;
  color: #080808;
  width: 18px; height: 18px;
  border-radius: 50%;
  font-size: 9px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: none;
}

#vip-chat-panel {
  position: fixed;
  bottom: 154px;
  right: 24px;
  z-index: 300;
  width: 340px;
  max-height: 520px;
  background: #0e0e0e;
  border: 1px solid #2a2622;
  display: none;
  flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(196,160,70,0.15);
  animation: chatSlideUp 0.3s cubic-bezier(.22,.68,0,1.2);
}
@keyframes chatSlideUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
#vip-chat-panel.open { display: flex; }

.chat-header {
  background: linear-gradient(135deg, #1a1208, #0e0d0a);
  border-bottom: 1px solid #2a2622;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.chat-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, #c4a046, #8a6d2e);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.chat-header-info { flex: 1; }
.chat-header-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 14px;
  color: #f5e9cc;
  font-weight: 600;
  line-height: 1;
}
.chat-header-status {
  font-size: 9px;
  color: #8a6d2e;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 2px;
}
.chat-header-status::before {
  content: '●';
  color: #3a7a4a;
  margin-right: 4px;
  font-size: 7px;
}
.chat-close {
  background: transparent;
  border: none;
  color: #6b6050;
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
  transition: color 0.2s;
}
.chat-close:hover { color: #c4a046; }

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  min-height: 200px;
  max-height: 320px;
  scrollbar-width: thin;
  scrollbar-color: #2a2622 transparent;
}
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: #2a2622; }

.chat-bubble {
  max-width: 85%;
  padding: 10px 13px;
  font-family: 'Raleway', sans-serif;
  font-size: 12px;
  line-height: 1.6;
  border-radius: 2px;
}
.chat-bubble.assistant {
  background: #141414;
  border: 1px solid #1e1e1e;
  border-left: 2px solid #c4a046;
  color: #e8dfc8;
  align-self: flex-start;
}
.chat-bubble.user {
  background: rgba(196,160,70,0.12);
  border: 1px solid rgba(196,160,70,0.25);
  color: #f5e9cc;
  align-self: flex-end;
  text-align: right;
}
.chat-bubble.typing {
  background: #141414;
  border: 1px solid #1e1e1e;
  border-left: 2px solid #c4a046;
  align-self: flex-start;
  padding: 12px 16px;
}
.typing-dots {
  display: flex;
  gap: 4px;
  align-items: center;
}
.typing-dots span {
  width: 6px; height: 6px;
  background: #c4a046;
  border-radius: 50%;
  animation: typingBounce 1.2s infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typingBounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30%          { transform: translateY(-4px); opacity: 1; }
}

.chat-input-area {
  border-top: 1px solid #1e1e1e;
  padding: 12px;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
  background: #0e0e0e;
}
.chat-input {
  flex: 1;
  background: #141414;
  border: 1px solid #1e1e1e;
  color: #e8dfc8;
  padding: 9px 12px;
  font-family: 'Raleway', sans-serif;
  font-size: 12px;
  outline: none;
  resize: none;
  height: 38px;
  transition: border-color 0.2s;
}
.chat-input:focus { border-color: #8a6d2e; }
.chat-input::placeholder { color: #6b6050; }
.chat-send {
  width: 38px; height: 38px;
  background: #c4a046;
  border: none;
  color: #080808;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.chat-send:hover { background: #f0d080; }
.chat-send:disabled { background: #2a2622; color: #6b6050; cursor: not-allowed; }

.chat-footer {
  padding: 6px 12px 10px;
  text-align: center;
  font-family: 'Raleway', sans-serif;
  font-size: 8px;
  color: #6b6050;
  letter-spacing: 0.1em;
  border-top: 1px solid #1e1e1e;
  flex-shrink: 0;
}
.chat-footer a { color: #8a6d2e; text-decoration: none; }
.chat-footer a:hover { color: #c4a046; }

.chat-quick-btns {
  display: flex;
  gap: 6px;
  padding: 0 12px 10px;
  flex-wrap: wrap;
  flex-shrink: 0;
}
.chat-quick-btn {
  background: transparent;
  border: 1px solid #2a2622;
  color: #8a6d2e;
  padding: 4px 10px;
  font-family: 'Raleway', sans-serif;
  font-size: 9px;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: all 0.2s;
}
.chat-quick-btn:hover {
  border-color: #c4a046;
  color: #c4a046;
}

@media (max-width: 400px) {
  #vip-chat-panel {
    right: 0;
    bottom: 0;
    width: 100vw;
    max-height: 100vh;
    border-left: none;
    border-right: none;
    border-bottom: none;
  }
  #vip-chat-btn { bottom: 24px; right: 16px; }
}
</style>

<!-- Chat Button -->
<button id="vip-chat-btn" onclick="toggleChat()" title="Vendedor VIP IA">
  ✦
  <span class="chat-badge" id="chat-notif" style="display:none">1</span>
</button>

<!-- Chat Panel -->
<div id="vip-chat-panel">
  <!-- Header -->
  <div class="chat-header">
    <div class="chat-avatar">✦</div>
    <div class="chat-header-info">
      <div class="chat-header-name">Lumière — Asesora VIP</div>
      <div class="chat-header-status">En línea · LuxeToy</div>
    </div>
    <button class="chat-close" onclick="toggleChat()">×</button>
  </div>

  <!-- Messages -->
  <div class="chat-messages" id="chat-messages"></div>

  <!-- Quick options (initial) -->
  <div class="chat-quick-btns" id="chat-quick">
    <button class="chat-quick-btn" onclick="quickSend('¿Qué me recomiendas para regalo?')">🎁 Regalo especial</button>
    <button class="chat-quick-btn" onclick="quickSend('¿Qué productos tienen para parejas?')">💑 Para parejas</button>
    <button class="chat-quick-btn" onclick="quickSend('¿Cuáles son los más vendidos?')">⭐ Más vendidos</button>
    <button class="chat-quick-btn" onclick="quickSend('¿Tienen opciones económicas?')">💰 Económicos</button>
  </div>

  <!-- Input -->
  <div class="chat-input-area">
    <textarea
      id="chat-input"
      class="chat-input"
      placeholder="Escribe tu consulta..."
      onkeydown="handleChatKey(event)"
      rows="1"
    ></textarea>
    <button id="chat-send-btn" class="chat-send" onclick="sendChatMessage()">➤</button>
  </div>

  <div class="chat-footer">
    Asistida por IA · Privacidad garantizada ·
    <a href="https://wa.me/56930347664" target="_blank">WhatsApp</a>
  </div>
</div>

<script>
// ── VENDEDOR VIP CHAT ──────────────────────────────────────────────
let chatHistory = [];
let chatOpen = false;
let chatInitialized = false;
let chatLoading = false;

function toggleChat() {
  chatOpen = !chatOpen;
  const panel = document.getElementById('vip-chat-panel');
  const notif = document.getElementById('chat-notif');
  if (chatOpen) {
    panel.classList.add('open');
    notif.style.display = 'none';
    document.getElementById('vip-chat-btn').innerHTML = '×<span class="chat-badge" id="chat-notif" style="display:none">1</span>';
    if (!chatInitialized) initChat();
    setTimeout(() => document.getElementById('chat-input')?.focus(), 300);
  } else {
    panel.classList.remove('open');
    document.getElementById('vip-chat-btn').innerHTML = '✦<span class="chat-badge" id="chat-notif" style="display:none">1</span>';
  }
}

function initChat() {
  chatInitialized = true;
  addBubble('assistant', 'Bienvenida/o a LuxeToy ✦ Soy Lumière, tu asesora VIP. ¿En qué puedo acompañarte hoy?');
}

function addBubble(role, text) {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `chat-bubble ${role}`;
  div.innerHTML = text.replace(/\n/g, '<br/>');
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function showTyping() {
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-bubble typing';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  document.getElementById('typing-indicator')?.remove();
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChatMessage();
  }
}

function quickSend(text) {
  document.getElementById('chat-input').value = text;
  document.getElementById('chat-quick').style.display = 'none';
  sendChatMessage();
}

async function sendChatMessage() {
  if (chatLoading) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;

  // Hide quick buttons after first message
  document.getElementById('chat-quick').style.display = 'none';

  // Add user bubble
  addBubble('user', text);
  chatHistory.push({ role: 'user', content: text });
  input.value = '';

  // Disable send
  chatLoading = true;
  document.getElementById('chat-send-btn').disabled = true;
  showTyping();

  try {
    const res = await fetch('/api/vendedor-vip', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: chatHistory }),
    });

    const data = await res.json();
    hideTyping();

    if (data.reply) {
      addBubble('assistant', data.reply);
      chatHistory.push({ role: 'assistant', content: data.reply });
    } else {
      addBubble('assistant', 'Lo siento, tuve un inconveniente. ¿Puedes escribirme por <a href="https://wa.me/56930347664" target="_blank" style="color:#c4a046">WhatsApp</a>?');
    }
  } catch (err) {
    hideTyping();
    addBubble('assistant', 'Hubo un error de conexión. Puedes contactarme por <a href="https://wa.me/56930347664" target="_blank" style="color:#c4a046">WhatsApp</a> 💬');
  }

  chatLoading = false;
  document.getElementById('chat-send-btn').disabled = false;
  input.focus();
}

// Show notification after 4 seconds if chat not opened
setTimeout(() => {
  if (!chatOpen && !chatInitialized) {
    const notif = document.getElementById('chat-notif');
    if (notif) notif.style.display = 'flex';
  }
}, 4000);
</script>
