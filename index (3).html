const useStyles = () => {
  useEffect(() => {

    link.rel = "stylesheet";
    document.head.appendChild(link);
    const style = document.createElement("style");
    style.textContent = `
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      html,body,#root{height:100%;background:#080808}
      ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0d0d0d}::-webkit-scrollbar-thumb{background:#8a6d2e;border-radius:2px}
      input,textarea,select,button{font-family:'Raleway',sans-serif;outline:none}
      @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
      @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes spin{to{transform:rotate(360deg)}}
      .fu{animation:fadeUp 0.5s cubic-bezier(.22,.68,0,1.2) both}
      .fi{animation:fadeIn 0.35s ease both}
      .gold-shimmer{background:linear-gradient(90deg,#c4a046,#f0d080,#c4a046,#9a7a30,#c4a046);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}
      .ch{transition:transform 0.3s cubic-bezier(.22,.68,0,1.2),box-shadow 0.3s ease}
      .ch:hover{transform:translateY(-5px);box-shadow:0 20px 50px rgba(0,0,0,.7),0 0 25px rgba(196,160,70,.08)}
      .ba{transition:all 0.2s ease}.ba:hover{opacity:0.85}.ba:active{transform:scale(0.97)}
      .nl{position:relative;transition:color 0.2s}
      .nl::after{content:'';position:absolute;bottom:-3px;left:50%;right:50%;height:1px;background:#c4a046;transition:left 0.25s,right 0.25s}
      .nl:hover::after,.nl.active::after{left:0;right:0}
      .ifield:focus{border-color:#8a6d2e!important}
      .spin{animation:spin 0.8s linear infinite;border:2px solid rgba(196,160,70,0.2);border-top-color:#c4a046;border-radius:50%;width:16px;height:16px;display:inline-block;vertical-align:middle;margin-right:7px}
      .img-preview{object-fit:cover;width:100%;height:100%}
    `;
    document.head.appendChild(style);
  }, []);
};

const Field = ({label,value,onChange,type="text",placeholder,required,rows,as="input",hint}) => (

// ── PRODUCT IMAGE COMPONENT ───────────────────────────────────────────────────
function ProductImg({img, emoji, height=160, fontSize=42}) {
  const [err, setErr] = useState(false);
  const showImg = img && !err;
  return (
    <div style={{height,background:"linear-gradient(135deg,#0e0e0e,#1a1510)",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",overflow:"hidden"}}>
      {showImg
        ? <img src={img} alt="" className="img-preview" onError={()=>setErr(true)}
            style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",opacity:0.92}}/>
        : <>
            <div style={{fontSize,opacity:0.1,position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%) scale(2)",filter:"blur(8px)"}}>{emoji}</div>
            <div style={{fontSize,position:"relative",zIndex:1}}>{emoji}</div>
          </>
      }
      {showImg && <div style={{position:"absolute",inset:0,background:"linear-gradient(to top,rgba(0,0,0,0.3) 0%,transparent 60%)"}}/>}
    </div>
  );
}

// ── PRODUCT CARD ──────────────────────────────────────────────────────────────
function PCard({p,onAdd,onView}) {
  const [added,setAdded] = useState(false);
  return (
    <div className="ch" onClick={()=>onView(p)}
      style={{background:C.bg2,border:`1px solid ${C.border}`,cursor:"pointer",display:"flex",flexDirection:"column",overflow:"hidden"}}>
      <GDivider/>
      <div style={{position:"relative"}}>
        <ProductImg img={p.img} emoji={p.emoji} height={160}/>
        <div style={{position:"absolute",top:9,left:9,display:"flex",gap:4,flexWrap:"wrap",zIndex:2}}>
          {p.new&&<Bdg label="Nuevo" gold/>}{p.vip&&<Bdg label="VIP" gold/>}
          {p.oldPrice&&<Bdg label="Oferta"/>}{p.stock<=5&&<Bdg label={`×${p.stock}`}/>}
        </div>
      </div>
      <div style={{padding:"14px 16px 16px",flexGrow:1,display:"flex",flexDirection:"column",gap:9}}>
        <div>
          <div style={{fontFamily:T.s,fontSize:16,color:C.cream,fontWeight:600,lineHeight:1.2,marginBottom:2}}>{p.name}</div>
          <div style={{fontFamily:T.b,fontSize:9,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase"}}>{p.sub}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:7}}><Stars r={p.rating}/><span style={{fontFamily:T.b,fontSize:9,color:C.muted}}>({p.reviews})</span></div>
        <div style={{display:"flex",alignItems:"baseline",gap:9,marginTop:"auto"}}>
          <span style={{fontFamily:T.s,fontSize:19,color:C.gold,fontWeight:600}}>{fmt(p.price)}</span>
          {p.oldPrice&&<span style={{fontFamily:T.b,fontSize:10,color:C.muted,textDecoration:"line-through"}}>{fmt(p.oldPrice)}</span>}
        </div>
        <button className="ba" onClick={e=>{e.stopPropagation();onAdd(p);setAdded(true);setTimeout(()=>setAdded(false),1800)}}
          style={{background:added?C.goldDim:"transparent",border:`1px solid ${added?C.goldD:C.gold}`,color:added?C.goldD:C.gold,
            padding:"8px",fontFamily:T.b,fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",cursor:"pointer",transition:"all 0.3s"}}>
          {added?"✓ Agregado":"Agregar al carrito"}
        </button>
      </div>
    </div>
  );
}

function CatalogView({products,cats,onAdd,onView}) {
  const [cat,setCat]=useState("all");
  const [sort,setSort]=useState("featured");
  const [q,setQ]=useState("");
  const allCats=[{id:"all",label:"Todo"},...cats];
  const items = products.filter(p=>p.active).filter(p=>cat==="all"||p.cat===cat)
    .filter(p=>!q||p.name.toLowerCase().includes(q.toLowerCase()))
    .sort((a,b)=>sort==="price-asc"?a.price-b.price:sort==="price-desc"?b.price-a.price:sort==="rating"?b.rating-a.rating:b.vip-a.vip);
  return (
    <div style={{minHeight:"100vh",paddingBottom:80}}>
      <div style={{padding:"40px 24px 32px",textAlign:"center"}}>
        <SHead sup="Boutique LuxeToy" title={<>La <em>Colección</em></>}/>
        <div style={{maxWidth:340,margin:"-20px auto 0",position:"relative"}}>
          <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:13}}>🔍</span>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar..." className="ifield"
            style={{width:"100%",background:C.bg2,border:`1px solid ${C.border}`,color:C.text,padding:"9px 12px 9px 34px",fontFamily:T.b,fontSize:11}}/>
        </div>
      </div>
      <div style={{borderTop:`1px solid ${C.border}`,borderBottom:`1px solid ${C.border}`,background:C.bg2,padding:"11px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10,marginBottom:32,position:"sticky",top:60,zIndex:10}}>
        <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
          {allCats.map(c=><button key={c.id} onClick={()=>setCat(c.id)} className="ba"
            style={{fontFamily:T.b,fontSize:8,letterSpacing:"0.15em",textTransform:"uppercase",padding:"5px 11px",cursor:"pointer",
              border:`1px solid ${cat===c.id?C.gold:C.border}`,background:cat===c.id?C.goldDim:"transparent",color:cat===c.id?C.gold:C.muted}}>{c.label}</button>)}
        </div>
        <select value={sort} onChange={e=>setSort(e.target.value)}
          style={{fontFamily:T.b,fontSize:9,background:C.bg3,border:`1px solid ${C.border}`,color:C.muted,padding:"6px 10px",cursor:"pointer"}}>

}

          <p style={{fontFamily:T.b,fontSize:12,color:C.textD,lineHeight:1.8,borderLeft:`2px solid ${C.goldD}`,paddingLeft:12,marginBottom:20}}>{p.desc}</p>
          <div style={{fontFamily:T.b,fontSize:10,color:p.stock<=5?C.error:C.muted,marginBottom:18}}>{p.stock<=5?`⚠ Últimas ${p.stock} unidades`:`✓ ${p.stock} en stock`}</div>
          <div style={{display:"flex",alignItems:"baseline",gap:12,marginBottom:20}}>
            <span style={{fontFamily:T.s,fontSize:28,color:C.gold,fontWeight:600}}>{fmt(p.price)}</span>
            {p.oldPrice&&<span style={{fontFamily:T.b,fontSize:12,color:C.muted,textDecoration:"line-through"}}>{fmt(p.oldPrice)}</span>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:9,marginBottom:16}}>
            <span style={{fontFamily:T.b,fontSize:9,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase"}}>Cant.</span>
            <div style={{display:"flex",border:`1px solid ${C.border}`}}>
              {[-1,null,1].map((d,i)=>d===null
                ? <span key="n" style={{width:40,textAlign:"center",lineHeight:"32px",fontFamily:T.b,fontSize:13,color:C.cream}}>{qty}</span>
                : <button key={i} onClick={()=>setQty(q=>Math.max(1,Math.min(p.stock,q+d)))}
                    style={{width:32,height:32,background:"transparent",border:"none",color:C.gold,fontSize:16,cursor:"pointer",
                      borderRight:d<0?`1px solid ${C.border}`:"none",borderLeft:d>0?`1px solid ${C.border}`:"none"}}>{d<0?"−":"+"}</button>
              )}
            </div>
          </div>
          <button className="ba" onClick={()=>{for(let i=0;i<qty;i++)onAdd(p);setAdded(true);setTimeout(()=>setAdded(false),2000)}}
            style={{width:"100%",padding:"13px",background:added?C.goldD:C.gold,border:"none",color:C.bg,fontFamily:T.b,fontSize:10,letterSpacing:"0.25em",textTransform:"uppercase",fontWeight:500,cursor:"pointer",transition:"all 0.3s",marginBottom:14}}>
            {added?`✓ ${qty} Agregado${qty>1?"s":""}` :"Agregar al Carrito"}
          </button>
          <div style={{display:"flex",gap:14,fontFamily:T.b,fontSize:10,color:C.muted}}>
            <span>🔒 Pago seguro</span><span>📦 Discreto</span><span>↩️ 30 días</span>
          </div>
        </div>
      </div>
    </div>
  );
}

      <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:20}}>

            <div style={{width:52,height:52,background:C.bg3,border:`1px solid ${C.border}`,overflow:"hidden",flexShrink:0,position:"relative"}}>

            </div>
            <div style={{flexGrow:1,minWidth:120}}>
              <div style={{fontFamily:T.s,fontSize:15,color:C.cream,fontWeight:600}}>{item.name}</div>
              <div style={{fontFamily:T.b,fontSize:9,color:C.muted}}>{item.sub}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5}}>
              {[-1,null,1].map((d,i)=>d===null
                ? <span key="n" style={{width:30,textAlign:"center",fontFamily:T.b,fontSize:13,color:C.cream}}>{item.qty}</span>
                : <button key={i} onClick={()=>onUpdateQty(item.id,item.qty+d)}

          </div>

      <div style={{background:C.bg2,border:`1px solid ${C.border}`,padding:"22px",maxWidth:340,marginLeft:"auto"}}>
        <GDivider/><div style={{height:14}}/>
        {[["Subtotal",fmt(sub)],["Envío",ship===0?"GRATIS ✓":fmt(ship)]].map(([k,v])=>(
          <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:9}}>
            <span style={{fontFamily:T.b,fontSize:10,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase"}}>{k}</span>
            <span style={{fontFamily:T.b,fontSize:12,color:k==="Envío"&&ship===0?C.gold:C.text}}>{v}</span>
          </div>
        ))}
        {ship>0&&<div style={{fontFamily:T.b,fontSize:9,color:C.muted,marginBottom:9}}>Faltan {fmt(50000-sub)} para envío gratis</div>}
        <Divider/><div style={{height:12}}/>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}>
          <span style={{fontFamily:T.s,fontSize:16,color:C.cream,fontWeight:600}}>Total</span>
          <span style={{fontFamily:T.s,fontSize:20,color:C.gold,fontWeight:600}}>{fmt(sub+ship)}</span>
        </div>

      </div>
    </div>
  );
}

function CheckoutView({total,cart,onSuccess,onBack}) {
  const [step,setStep]=useState(1);
  const [loading,setLoading]=useState(false);
  const [form,setForm]=useState({name:"",email:"",phone:"",address:"",city:"Santiago",region:"Metropolitana",notes:""});
  const [pay,setPay]=useState({method:"mp",card:"",holder:"",exp:"",cvv:"",mpOption:""});
  const [order]=useState("#LT-"+String(Math.floor(1000+Math.random()*8999)));
  const ff=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const pf=k=>e=>setPay(p=>({...p,[k]:e.target.value}));
  const fmtCard=v=>v.replace(/\D/g,"").replace(/(.{4})/g,"$1 ").trim().slice(0,19);
  const fmtExp=v=>v.replace(/\D/g,"").replace(/^(\d{2})(\d)/,"$1/$2").slice(0,5);
  const ok1=form.name&&form.email&&form.address;

  const pay_ = async () => {
    setLoading(true);

    // ── MercadoPago Checkout Pro ──
    if (pay.method === "mp") {
      try {
        const res = await fetch("/.netlify/functions/create-preference", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            items:    cart,
            order_id: order,
            payer:    { name: form.name, email: form.email, phone: form.phone },
          }),
        });
        const data = await res.json();
        if (data.init_point) {
          // Redirigir a MercadoPago
          window.location.href = data.init_point;
          return;
        } else {
          alert("Error al conectar con MercadoPago. Intenta otro método.");
          setLoading(false);
          return;
        }
      } catch (e) {
        alert("Error de conexión. Verifica tu internet.");
        setLoading(false);
        return;
      }
    }

    // ── Otros métodos (simulación) ──
    setTimeout(() => { setLoading(false); setStep(3); }, 2400);
  };

  if(step===3) return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <div className="fu">
        <div style={{fontSize:56,marginBottom:20}}>✦</div>
        <div style={{fontFamily:T.s,fontSize:36,color:C.gold,fontWeight:600,marginBottom:6}}>¡Pago Exitoso!</div>
        <div style={{fontFamily:T.b,fontSize:12,color:C.muted,marginBottom:5}}>Orden confirmada</div>
        <div style={{fontFamily:T.s,fontSize:20,color:C.cream,marginBottom:24}}>{order}</div>
        <div style={{background:C.bg2,border:`1px solid ${C.border}`,padding:"20px 28px",marginBottom:24,maxWidth:340,textAlign:"left",display:"inline-block"}}>
          <GDivider/><div style={{height:12}}/>
          {[["Orden",order],["Destino",form.city],["Total",fmt(total)],["Despacho","48h discreto"]].map(([k,v])=>(
            <div key={k} style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <span style={{fontFamily:T.b,fontSize:9,color:C.muted,letterSpacing:"0.15em",textTransform:"uppercase"}}>{k}</span>
              <span style={{fontFamily:T.b,fontSize:11,color:C.text}}>{v}</span>
            </div>
          ))}
        </div>
        <div style={{fontFamily:T.b,fontSize:11,color:C.muted,marginBottom:24}}>Confirmación enviada a <strong style={{color:C.text}}>{form.email}</strong></div>
        <Btn onClick={onSuccess}>Volver al inicio</Btn>
      </div>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",padding:"38px 24px 80px",maxWidth:800,margin:"0 auto"}}>
      <button onClick={onBack} className="ba" style={{fontFamily:T.b,fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:C.muted,background:"transparent",border:"none",cursor:"pointer",marginBottom:28,padding:0}}>← Volver al carrito</button>

              <span style={{fontFamily:T.b,fontSize:9,color:step>=s?C.gold:C.muted,letterSpacing:"0.15em",textTransform:"uppercase"}}>{s===1?"Envío":"Pago"}</span>
            </div>

// ── CATEGORY MANAGER ──────────────────────────────────────────────────────────
function CatManager({cats,setCats,products,setProducts}) {
  const [newLabel,setNewLabel]=useState("");
  const [editId,setEditId]=useState(null);
  const [editLabel,setEditLabel]=useState("");

  const slugify = s => s.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");

  const addCat = () => {
    if(!newLabel.trim()) return;
    const id = slugify(newLabel) + "-" + Date.now().toString().slice(-4);
    setCats(prev=>[...prev,{id,label:newLabel.trim()}]);
    setNewLabel("");
  };

  const saveEdit = (id) => {
    if(!editLabel.trim()) return;
    setCats(prev=>prev.map(c=>c.id===id?{...c,label:editLabel.trim()}:c));
    setEditId(null);
  };

  const deleteCat = (id) => {
    const inUse = products.some(p=>p.cat===id);
    if(inUse){ alert("Esta categoría tiene productos. Reasígnalos antes de eliminar."); return; }
    setCats(prev=>prev.filter(c=>c.id!==id));
  };

  return (
    <div className="fi">
      <div style={{fontFamily:T.s,fontSize:22,color:C.cream,fontWeight:300,marginBottom:20}}>Gestión de <em>Categorías</em></div>

      {/* Add new */}
      <div style={{background:C.bg2,border:`1px solid ${C.border}`,padding:"18px 20px",marginBottom:16}}>
        <div style={{fontFamily:T.b,fontSize:9,color:C.muted,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:10}}>Nueva categoría</div>
        <div style={{display:"flex",gap:10}}>
          <input value={newLabel} onChange={e=>setNewLabel(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addCat()}
            placeholder="Nombre de la categoría..." className="ifield"
            style={{flex:1,background:C.bg3,border:`1px solid ${C.border}`,color:C.text,padding:"10px 12px",fontFamily:T.b,fontSize:12}}/>
          <Btn onClick={addCat} disabled={!newLabel.trim()}>+ Agregar</Btn>
        </div>
      </div>

      {/* List */}
      <div style={{display:"flex",flexDirection:"column",gap:2}}>
        {cats.map(c=>{
          const count = products.filter(p=>p.cat===c.id).length;
          return (
            <div key={c.id} style={{background:C.bg2,border:`1px solid ${C.border}`,padding:"13px 16px",display:"flex",alignItems:"center",gap:12}}>
              {editId===c.id ? (
                <>
                  <input value={editLabel} onChange={e=>setEditLabel(e.target.value)}
                    onKeyDown={e=>e.key==="Enter"&&saveEdit(c.id)} autoFocus
                    className="ifield" style={{flex:1,background:C.bg3,border:`1px solid ${C.gold}`,color:C.text,padding:"8px 10px",fontFamily:T.b,fontSize:12}}/>
                  <Btn small onClick={()=>saveEdit(c.id)}>Guardar</Btn>
                  <Btn small outline onClick={()=>setEditId(null)}>Cancelar</Btn>
                </>
              ) : (
                <>
                  <div style={{flex:1}}>
                    <span style={{fontFamily:T.s,fontSize:16,color:C.cream,fontWeight:600}}>{c.label}</span>
                    <span style={{fontFamily:T.b,fontSize:9,color:C.muted,marginLeft:10,letterSpacing:"0.1em"}}>{count} producto{count!==1?"s":""}</span>
                  </div>
                  <span style={{fontFamily:T.b,fontSize:9,color:C.muted,background:C.bg3,padding:"3px 8px",border:`1px solid ${C.border}`}}>{c.id}</span>
                  <button className="ba" onClick={()=>{setEditId(c.id);setEditLabel(c.label)}}
                    style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"5px 10px",fontFamily:T.b,fontSize:9,cursor:"pointer"}}>✏ Renombrar</button>
                  <button className="ba" onClick={()=>deleteCat(c.id)} disabled={count>0}
                    style={{background:"rgba(139,32,32,0.1)",border:`1px solid ${count>0?C.border:"rgba(139,32,32,0.4)"}`,color:count>0?C.border:C.error,padding:"5px 10px",fontFamily:T.b,fontSize:11,cursor:count>0?"not-allowed":"pointer"}}>×</button>
                </>
              )}
            </div>
          );
        })}
      </div>

      <div style={{fontFamily:T.b,fontSize:9,color:C.muted,marginTop:14,lineHeight:1.7,borderTop:`1px solid ${C.border}`,paddingTop:14}}>
        💡 No puedes eliminar una categoría que tiene productos asignados. Primero cambia la categoría de esos productos.
      </div>
    </div>
  );
}

function ProductModal({modal,form,setForm,cats,onSave,onClose}) {
  const ff = k => e => setForm(p=>({...p,[k]:e&&e.target?e.target.value:e}));
  const tog = k => setForm(p=>({...p,[k]:!p[k]}));
  const [imgErr, setImgErr] = useState(false);
  const [imgTab, setImgTab] = useState("paste"); // "paste" | "url"
  const [dragging, setDragging] = useState(false);
  const [pasteHint, setPasteHint] = useState("");
  const dropRef = useRef(null);

  useEffect(()=>setImgErr(false),[form.img]);

  // ── read image file → base64 ──
  const loadFile = (file) => {
    if (!file || !file.type.startsWith("image/")) {
      setPasteHint("⚠ Solo se aceptan imágenes.");
      return;
    }
    const reader = new FileReader();
    reader.onload = e => {
      setForm(p=>({...p, img: e.target.result}));
      setImgErr(false);
      setPasteHint("✓ Imagen cargada");
      setTimeout(()=>setPasteHint(""), 2000);
    };
    reader.readAsDataURL(file);
  };

  // ── global paste listener (Ctrl+V anywhere in modal) ──
  useEffect(() => {
    const onPaste = (e) => {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith("image/")) {
          e.preventDefault();
          loadFile(item.getAsFile());
          return;
        }
      }
    };
    window.addEventListener("paste", onPaste);
    return () => window.removeEventListener("paste", onPaste);
  }, []);

  // ── drag & drop ──
  const onDragOver = e => { e.preventDefault(); setDragging(true); };
  const onDragLeave = () => setDragging(false);
  const onDrop = e => {
    e.preventDefault(); setDragging(false);
    const file = e.dataTransfer.files?.[0];
    loadFile(file);
  };

  // ── file input ──
  const fileRef = useRef(null);
  const onFileChange = e => loadFile(e.target.files?.[0]);

  const hasImg = form.img && !imgErr;

  return (
    <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.86)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,animation:"fadeIn 0.2s ease"}}>
      <div onClick={e=>e.stopPropagation()} style={{background:C.bg2,border:`1px solid ${C.border}`,padding:"28px 26px",width:"100%",maxWidth:580,maxHeight:"92vh",overflowY:"auto",animation:"fadeUp 0.3s cubic-bezier(.22,.68,0,1.2)"}}>
        <GDivider/><div style={{height:18}}/>
        <div style={{fontFamily:T.s,fontSize:20,color:C.cream,fontWeight:600,marginBottom:18}}>{modal==="add"?"Nuevo Producto":"Editar Producto"}</div>

        <div style={{display:"flex",flexDirection:"column",gap:14}}>

          {/* ── IMAGE SECTION ── */}
          <div style={{background:C.bg3,border:`1px solid ${C.border2}`,padding:"16px"}}>
            <div style={{fontFamily:T.b,fontSize:9,color:C.goldD,letterSpacing:"0.25em",textTransform:"uppercase",marginBottom:12}}>🖼 Imagen del Producto</div>

            {/* Sub-tabs */}
            <div style={{display:"flex",gap:0,marginBottom:14,borderBottom:`1px solid ${C.border}`}}>
              {[["paste","📋 Pegar / Arrastrar"],["url","🔗 URL"]].map(([t,l])=>(
                <button key={t} onClick={()=>setImgTab(t)} className="ba"
                  style={{padding:"7px 14px",fontFamily:T.b,fontSize:9,letterSpacing:"0.12em",background:"transparent",border:"none",cursor:"pointer",
                    color:imgTab===t?C.gold:C.muted,borderBottom:imgTab===t?`2px solid ${C.gold}`:"2px solid transparent"}}>
                  {l}
                </button>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 110px",gap:14,alignItems:"start"}}>

              <div>
                {imgTab==="paste" && (
                  <div>
                    {/* Drop zone */}
                    <div ref={dropRef}
                      onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
                      onClick={()=>fileRef.current?.click()}
                      style={{
                        border:`2px dashed ${dragging?C.gold:C.border2}`,
                        background:dragging?"rgba(196,160,70,0.05)":"transparent",
                        padding:"22px 16px", textAlign:"center", cursor:"pointer",
                        transition:"all 0.2s", marginBottom:10,
                      }}>
                      <div style={{fontSize:28,marginBottom:8}}>📋</div>
                      <div style={{fontFamily:T.b,fontSize:11,color:C.text,marginBottom:4}}>
                        <strong style={{color:C.gold}}>Ctrl+V</strong> para pegar imagen
                      </div>
                      <div style={{fontFamily:T.b,fontSize:10,color:C.muted,marginBottom:6}}>
                        o arrastra un archivo aquí
                      </div>
                      <div style={{fontFamily:T.b,fontSize:9,color:C.goldD,border:`1px solid ${C.border2}`,display:"inline-block",padding:"4px 12px"}}>
                        también puedes hacer click para seleccionar archivo
                      </div>
                      <input ref={fileRef} type="file" accept="image/*" onChange={onFileChange}
                        style={{display:"none"}}/>
                    </div>
                    {pasteHint&&(
                      <div style={{fontFamily:T.b,fontSize:10,color:pasteHint.startsWith("✓")?C.success:C.error,marginBottom:6}}>{pasteHint}</div>
                    )}
                    <div style={{fontFamily:T.b,fontSize:9,color:C.muted,lineHeight:1.7}}>
                      💡 <strong style={{color:C.textD}}>Cómo pegar:</strong> copia cualquier imagen desde Chrome, WhatsApp Web, tu galería, o haz screenshot — luego Ctrl+V aquí.
                    </div>
                  </div>
                )}

                {imgTab==="url" && (
                  <div style={{display:"flex",flexDirection:"column",gap:8}}>
                    <Field label="URL de imagen"
                      hint="link directo a la imagen"
                      value={form.img.startsWith("data:") ? "" : form.img}
                      onChange={e=>{ setForm(p=>({...p,img:e.target.value})); setImgErr(false); }}
                      placeholder="https://ejemplo.com/imagen.jpg"/>
                    <div style={{fontFamily:T.b,fontSize:9,color:C.muted,lineHeight:1.6}}>

              {/* Preview */}

                {hasImg

                        style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                      <button onClick={()=>setForm(p=>({...p,img:""}))}
                        style={{position:"absolute",top:3,right:3,background:"rgba(0,0,0,0.7)",border:"none",color:"#fff",width:18,height:18,borderRadius:"50%",cursor:"pointer",fontSize:10,lineHeight:1,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
                    </>
                  : <div style={{textAlign:"center"}}>
                      <div style={{fontSize:30}}>{form.emoji||"🖼"}</div>
                      <div style={{fontFamily:T.b,fontSize:7,color:C.muted,marginTop:4}}>sin imagen</div>
                    </div>
                }
              </div>
            </div>
          </div>

          {/* ── EMOJI FALLBACK ── */}
          <div>
            <div style={{fontFamily:T.b,fontSize:9,color:C.muted,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:8}}>Ícono (fallback si no hay imagen)</div>
            <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
              {EMOJIS.map(e=>(
                <button key={e} onClick={()=>setForm(p=>({...p,emoji:e}))} className="ba"
                  style={{fontSize:18,width:36,height:36,background:form.emoji===e?C.goldDim:"transparent",border:`1px solid ${form.emoji===e?C.gold:C.border}`,cursor:"pointer"}}>
                  {e}
                </button>
              ))}
            </div>
          </div>

          {/* ── PRODUCT INFO ── */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
            <Field label="Nombre" value={form.name} onChange={ff("name")} required placeholder="Nombre del producto"/>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <label style={{fontFamily:T.b,fontSize:9,color:C.muted,letterSpacing:"0.2em",textTransform:"uppercase"}}>Categoría <span style={{color:C.gold}}>*</span></label>
              <select value={form.cat} onChange={ff("cat")} className="ifield"
                style={{background:C.bg3,border:`1px solid ${C.border}`,color:C.text,padding:"10px 12px",fontFamily:T.b,fontSize:12}}>
                {cats.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
              </select>
            </div>
          </div>

          <Field label="Subtítulo" value={form.sub} onChange={ff("sub")} placeholder="Breve descripción visible en la tarjeta"/>
          <Field label="Descripción completa" value={form.desc} onChange={ff("desc")} as="textarea" rows={3} placeholder="Detalles del producto..."/>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:11}}>
            <Field label="Precio ($)" value={form.price} onChange={ff("price")} type="number" required placeholder="89900"/>
            <Field label="Precio anterior" value={form.oldPrice} onChange={ff("oldPrice")} type="number" placeholder="Opcional"/>
            <Field label="Stock" value={form.stock} onChange={ff("stock")} type="number" required placeholder="10"/>
          </div>

          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {[["new","🆕 Nuevo"],["vip","👑 VIP"],["active","✓ Activo"]].map(([k,l])=>(
              <button key={k} onClick={()=>tog(k)} className="ba"
                style={{padding:"7px 14px",background:form[k]?C.goldDim:"transparent",border:`1px solid ${form[k]?C.gold:C.border}`,color:form[k]?C.gold:C.muted,fontFamily:T.b,fontSize:9,letterSpacing:"0.1em",cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>
        </div>

        <div style={{display:"flex",gap:8,marginTop:22}}>
          <Btn outline onClick={onClose}>Cancelar</Btn>
          <div style={{flex:1}}><Btn full onClick={onSave} disabled={!form.name||!form.price}>{modal==="add"?"Crear Producto":"Guardar Cambios"}</Btn></div>
        </div>
      </div>
    </div>
  );
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
function AdminPanel({products,setProducts,cats,setCats,onLogout}) {
  const [tab,setTab]=useState("products");
  const [modal,setModal]=useState(null);
  const [editId,setEditId]=useState(null);
  const [q,setQ]=useState("");
  const empty={name:"",sub:"",desc:"",price:"",oldPrice:"",stock:"10",cat:cats[0]?.id||"masaje",emoji:"🖤",img:"",new:false,vip:false,active:true,rating:"4.8",reviews:"0"};
  const [form,setForm]=useState(empty);

  const openEdit=p=>{setEditId(p.id);setForm({...p,price:String(p.price),oldPrice:p.oldPrice?String(p.oldPrice):"",stock:String(p.stock),rating:String(p.rating),reviews:String(p.reviews)});setModal("edit")};
  const openAdd=()=>{setEditId(null);setForm({...empty,cat:cats[0]?.id||"masaje"});setModal("add")};
  const close=()=>{setModal(null);setEditId(null)};
  const save=()=>{
    const p={...form,id:editId||Date.now(),price:Number(form.price)||0,oldPrice:form.oldPrice?Number(form.oldPrice):null,stock:Number(form.stock)||0,rating:Number(form.rating)||4.8,reviews:Number(form.reviews)||0};
    if(modal==="add") setProducts(prev=>[...prev,p]);
    else setProducts(prev=>prev.map(x=>x.id===editId?{...x,...p}:x));
    close();
  };
  const del=id=>setProducts(prev=>prev.filter(p=>p.id!==id));
  const tog2=(id,k)=>setProducts(prev=>prev.map(p=>p.id===id?{...p,[k]:!p[k]}:p));

  const list=products.filter(p=>!q||p.name.toLowerCase().includes(q.toLowerCase()));
  const stats={active:products.filter(p=>p.active).length,stock:products.reduce((s,p)=>s+p.stock,0),val:products.reduce((s,p)=>s+p.price*p.stock,0),low:products.filter(p=>p.stock<=5).length};

  const TABS=[["products","📦 Productos"],["categories","🏷 Categorías"],["stats","📊 Estadísticas"]];

  return (
    <div style={{minHeight:"100vh",background:C.bg,paddingBottom:60}}>
      <div style={{background:C.bg2,borderBottom:`1px solid ${C.border}`,padding:"0 24px",height:54,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{fontFamily:T.s,fontSize:17,color:C.gold,fontWeight:600}}>⚙ Panel de Control</div>
          <div style={{height:18,width:1,background:C.border}}/>
          <div style={{fontFamily:T.b,fontSize:8,color:C.muted,letterSpacing:"0.2em",textTransform:"uppercase"}}>LuxeToy Admin</div>
        </div>
        <Btn outline small onClick={onLogout}>Cerrar sesión</Btn>
      </div>

      <div style={{borderBottom:`1px solid ${C.border}`,background:C.bg2,padding:"0 24px",display:"flex",gap:0}}>
        {TABS.map(([t,l])=>(
          <button key={t} onClick={()=>setTab(t)} className="ba"
            style={{padding:"11px 18px",fontFamily:T.b,fontSize:9,letterSpacing:"0.15em",textTransform:"uppercase",background:"transparent",border:"none",cursor:"pointer",color:tab===t?C.gold:C.muted,borderBottom:tab===t?`2px solid ${C.gold}`:"2px solid transparent"}}>{l}</button>
        ))}
      </div>

      <div style={{maxWidth:1060,margin:"0 auto",padding:"24px"}}>

        {tab==="categories"&&(
          <CatManager cats={cats} setCats={setCats} products={products} setProducts={setProducts}/>
        )}

        {tab==="stats"&&(
          <div className="fi">
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14,marginBottom:28}}>
              {[["📦",`${stats.active} / ${products.length}`,"Productos activos"],["🏷",`${stats.stock} u.`,"Stock total"],["💰",fmt(stats.val),"Valor inventario"],["🔴",`${stats.low}`,"Stock crítico ≤5"]].map(([ico,v,t])=>(
                <div key={t} style={{background:C.bg2,border:`1px solid ${C.border}`,padding:"16px 18px"}}>
                  <div style={{fontSize:20,marginBottom:6}}>{ico}</div>
                  <div style={{fontFamily:T.s,fontSize:18,color:C.gold,fontWeight:600,marginBottom:3}}>{v}</div>
                  <div style={{fontFamily:T.b,fontSize:8,color:C.muted,letterSpacing:"0.15em",textTransform:"uppercase"}}>{t}</div>
                </div>
              ))}
            </div>
            <div style={{fontFamily:T.s,fontSize:16,color:C.cream,fontWeight:300,marginBottom:12}}>Stock por producto</div>
            {products.map(p=>(
              <div key={p.id} style={{background:C.bg2,border:`1px solid ${C.border}`,padding:"10px 14px",marginBottom:3,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",opacity:p.active?1:0.5}}>
                <div style={{width:32,height:32,overflow:"hidden",border:`1px solid ${C.border}`,flexShrink:0}}><ProductImg img={p.img} emoji={p.emoji} height={32} fontSize={14}/></div>
                <div style={{flex:1,minWidth:100}}><div style={{fontFamily:T.b,fontSize:11,color:C.text}}>{p.name}</div></div>
                <div style={{flex:2,display:"flex",alignItems:"center",gap:9}}>
                  <div style={{flex:1,background:C.bg3,height:5,borderRadius:2}}>
                    <div style={{width:`${Math.min(100,(p.stock/50)*100)}%`,height:"100%",borderRadius:2,background:p.stock<=5?C.error:p.stock<=15?C.goldD:C.gold}}/>
                  </div>
                  <span style={{fontFamily:T.b,fontSize:10,color:p.stock<=5?C.error:C.muted,minWidth:28,textAlign:"right"}}>{p.stock}</span>
                </div>
                <span style={{fontFamily:T.s,fontSize:12,color:C.gold,minWidth:76,textAlign:"right"}}>{fmt(p.price)}</span>
              </div>
            ))}
          </div>
        )}

        {tab==="products"&&(
          <div className="fi">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
              <div style={{position:"relative",flex:1,maxWidth:300}}>
                <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",color:C.muted,fontSize:12}}>🔍</span>
                <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar producto..." className="ifield"
                  style={{width:"100%",background:C.bg2,border:`1px solid ${C.border}`,color:C.text,padding:"8px 10px 8px 30px",fontFamily:T.b,fontSize:11}}/>
              </div>
              <Btn onClick={openAdd}>+ Nuevo Producto</Btn>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"44px 1fr 110px 80px 66px 66px 128px",gap:8,padding:"7px 12px",background:C.bg3,border:`1px solid ${C.border}`,marginBottom:2}}>
              {["","Producto","Precio","Stock","Activo","VIP",""].map((h,i)=><div key={i} style={{fontFamily:T.b,fontSize:8,color:C.muted,letterSpacing:"0.2em",textTransform:"uppercase"}}>{h}</div>)}
            </div>

            {list.map(p=>(
              <div key={p.id} style={{display:"grid",gridTemplateColumns:"44px 1fr 110px 80px 66px 66px 128px",gap:8,padding:"10px 12px",background:C.bg2,border:`1px solid ${C.border}`,marginBottom:2,alignItems:"center",opacity:p.active?1:0.5}}>
                <div style={{width:40,height:40,overflow:"hidden",border:`1px solid ${C.border}`}}><ProductImg img={p.img} emoji={p.emoji} height={40} fontSize={18}/></div>
                <div>
                  <div style={{fontFamily:T.b,fontSize:11,color:C.text,fontWeight:500}}>{p.name}</div>
                  <div style={{fontFamily:T.b,fontSize:9,color:C.muted}}>{cats.find(c=>c.id===p.cat)?.label||p.cat}</div>
                </div>
                <div>
                  <div style={{fontFamily:T.s,fontSize:12,color:C.gold,fontWeight:600}}>{fmt(p.price)}</div>
                  {p.oldPrice&&<div style={{fontFamily:T.b,fontSize:9,color:C.muted,textDecoration:"line-through"}}>{fmt(p.oldPrice)}</div>}
                </div>
                <div style={{fontFamily:T.b,fontSize:11,color:p.stock<=5?C.error:p.stock<=10?C.goldD:C.text}}>{p.stock} u.</div>
                <button onClick={()=>tog2(p.id,"active")} className="ba"
                  style={{background:p.active?"rgba(58,122,74,0.15)":"rgba(139,32,32,0.1)",border:`1px solid ${p.active?C.success:C.error}`,color:p.active?C.success:C.error,padding:"3px 8px",fontFamily:T.b,fontSize:8,cursor:"pointer"}}>
                  {p.active?"ON":"OFF"}
                </button>
                <button onClick={()=>tog2(p.id,"vip")} className="ba"
                  style={{background:p.vip?C.goldDim:"transparent",border:`1px solid ${p.vip?C.gold:C.border}`,color:p.vip?C.gold:C.muted,padding:"3px 8px",fontFamily:T.b,fontSize:8,cursor:"pointer"}}>
                  {p.vip?"VIP":"—"}
                </button>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>openEdit(p)} className="ba"
                    style={{flex:1,background:"transparent",border:`1px solid ${C.gold}`,color:C.gold,padding:"5px 6px",fontFamily:T.b,fontSize:8,cursor:"pointer"}}>✏ Editar</button>
                  <button onClick={()=>del(p.id)} className="ba"
                    style={{background:"rgba(139,32,32,0.1)",border:`1px solid rgba(139,32,32,0.4)`,color:C.error,padding:"5px 9px",fontFamily:T.b,fontSize:12,cursor:"pointer",lineHeight:1}}>×</button>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {modal&&<ProductModal modal={modal} form={form} setForm={setForm} cats={cats} onSave={save} onClose={close}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════════
// ROOT
// ═══════════════════════════════════════════════════════════════════════════════
function App() {
  useStyles();
  const [view,setView]=useState("home");
  const [detail,setDetail]=useState(null);
  const [cart,setCart]=useState([]);
  const [products,setProducts]=useState(INIT_PRODUCTS);
  const [cats,setCats]=useState(INIT_CATS);
  const [adminAuth,setAdminAuth]=useState(false);
  const [checkTotal,setCheckTotal]=useState(0);

  const count=cart.reduce((s,i)=>s+i.qty,0);
  const go=useCallback((v,d=null)=>{setView(v);setDetail(d);window.scrollTo({top:0,behavior:"smooth"});},[]);
  const addToCart=useCallback(p=>setCart(prev=>{const ex=prev.find(i=>i.id===p.id);return ex?prev.map(i=>i.id===p.id?{...i,qty:i.qty+1}:i):[...prev,{...p,qty:1}];}),[]);
  const updateQty=(id,qty)=>{if(qty<1)setCart(p=>p.filter(i=>i.id!==id));else setCart(p=>p.map(i=>i.id===id?{...i,qty}:i));};
  const remove=id=>setCart(p=>p.filter(i=>i.id!==id));
  const checkout=total=>{setCheckTotal(total);go("checkout")};
  const done=()=>{setCart([]);go("home")};

  const NAV=[{id:"home",l:"Inicio"},{id:"catalog",l:"Colección"},{id:"vip",l:"Mi VIP"},{id:"contact",l:"Contacto"}];

  if(view==="admin") return adminAuth
    ? <AdminPanel products={products} setProducts={setProducts} cats={cats} setCats={setCats} onLogout={()=>{setAdminAuth(false);go("home")}}/>
    : <AdminLogin onLogin={()=>setAdminAuth(true)}/>;

  return (
    <div style={{background:C.bg,color:C.text,minHeight:"100vh",fontFamily:T.b}}>
      <nav style={{position:"sticky",top:0,zIndex:100,background:"rgba(8,8,8,0.96)",backdropFilter:"blur(16px)",borderBottom:`1px solid ${C.border}`,padding:"0 24px",height:58,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <Logo onClick={()=>go("home")} size={30}/>
        <div style={{display:"flex",gap:24,alignItems:"center"}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>go(n.id)} className={`nl${view===n.id?" active":""}`}
              style={{background:"transparent",border:"none",fontFamily:T.b,fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",color:view===n.id?C.gold:C.muted,cursor:"pointer",padding:"4px 0"}}>
              {n.l}
            </button>
          ))}
          <button onClick={()=>go("cart")}
            style={{background:view==="cart"?C.goldDim:"transparent",border:`1px solid ${view==="cart"?C.gold:C.border}`,color:C.gold,width:36,height:36,cursor:"pointer",position:"relative",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>
            🛒
            {count>0&&<span style={{position:"absolute",top:-6,right:-6,background:C.gold,color:C.bg,width:16,height:16,borderRadius:"50%",fontFamily:T.b,fontSize:8,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>{count}</span>}
          </button>
          <button onClick={()=>go("admin")} title="Admin"
            style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,width:28,height:28,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
        </div>
      </nav>
      <div style={{height:1,background:`linear-gradient(90deg,transparent,${C.gold} 30%,${C.gold} 70%,transparent)`,opacity:0.35}}/>

      {view==="home"    &&<HomeView products={products} cats={cats} onNav={go} onAdd={addToCart}/>}
      {view==="catalog" &&<CatalogView products={products} cats={cats} onAdd={addToCart} onView={p=>go("detail",p)}/>}
      {view==="detail"  &&detail&&<DetailView product={detail} cats={cats} onAdd={addToCart} onBack={()=>go("catalog")}/>}
      {view==="cart"    &&<CartView cart={cart} onUpdateQty={updateQty} onRemove={remove} onNav={go} onCheckout={checkout}/>}
      {view==="checkout"&&<CheckoutView total={checkTotal} cart={cart} onSuccess={done} onBack={()=>go("cart")}/>}
      {view==="contact" &&<ContactView/>}
      {view==="vip"     &&<VIPView/>}

      <footer style={{borderTop:`1px solid ${C.border}`,background:C.bg2,padding:"32px 24px",textAlign:"center"}}>
        <Logo size={26}/>
        <div style={{fontFamily:T.b,fontSize:8,color:C.muted,letterSpacing:"0.18em",marginTop:12,lineHeight:2.2}}>© 2026 LuxeToy · Boutique Íntima VIP · Chile</div>
        <div style={{marginTop:10,display:"flex",justifyContent:"center",gap:16,fontFamily:T.b,fontSize:8,color:C.goldD,letterSpacing:"0.15em"}}>
          <span style={{cursor:"pointer"}} onClick={()=>go("contact")}>Contacto</span><span>·</span>
          <span style={{cursor:"pointer"}}>Privacidad</span><span>·</span>
          <span style={{cursor:"pointer"}}>Términos</span><span>·</span>
          <span style={{cursor:"pointer"}} onClick={()=>go("admin")}>Admin ⚙</span>
        </div>
      </footer>
    </div>
  );
}
    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
